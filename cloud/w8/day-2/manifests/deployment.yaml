apiVersion: apps/v1
kind: Deployment
metadata:
  name: w8-day-2-nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: w8-day-2-nginx
  template:
    metadata:
      labels:
        app: w8-day-2-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
